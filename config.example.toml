[server]
bind = "0.0.0.0:3000"
webhook_secret = "your-jira-webhook-secret"
storage_path = "./data"

[jira]
base_url = "https://myorg.atlassian.net"
pat = "your-jira-personal-access-token"
transition_to = "In Review"
ready_to_dev_status = "ready-to-dev"

[github]
token = "ghp_your-github-personal-access-token"
webhook_secret = "your-github-webhook-secret"

[opencode]
model = "anthropic/claude-sonnet-4-20250514"
# Any extra opencode config keys. These are serialized as JSON
# and passed via OPENCODE_CONFIG_CONTENT.
# [opencode.extra]
# provider = { anthropic = { options = { apiKey = "..." } } }

[[mapping]]
label = "backend"
repo = "https://github.com/myorg/backend.git"

[[mapping]]
label = "frontend"
repo = "https://github.com/myorg/frontend.git"

# Optional: expose a Figma MCP server for coding agents.
# Requires npx (Node.js) on the host. The server runs as a child
# process alongside autodev and is reachable from agent containers
# via host.docker.internal.
# [figma]
# access_token = "figd-your-personal-access-token"
# port = 3100
# host = "127.0.0.1"
